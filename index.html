<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #0f172a;
            text-align: center;
            font-family: sans-serif;
        }

        h1 {
            color: #38bdf8;
            text-shadow: 0 0 20px #38bdf8;
        }

        h2 {
            color: #ff007c;
            text-shadow: 0 0 10px #ff007c;
        }

        img {
            border-radius: 50%;
            border: 4px solid white;
            width: 300px;
            height: 300px;
            object-fit: cover;
            box-shadow: 0 0 30px #38bdf8;
        }

        a {
            text-decoration: none;
        }

        @keyframes leftRightMove {
            0% {transform: translateX(20px);}
            100% {transform: translateX(-20px);}
        }

        a h1 {
            animation: leftRightMove 1.5s ease-in-out infinite alternate;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
        }

        .fake-alert {
            background-color: rgb(22,22,22);
            color: red;
            position: fixed;
            left: 50%;
            top: 50%;
            border: 2px solid red;
            box-shadow: 0 0 25px #ff3333;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            transform: scale(0.1);
            opacity: 0;
            transition: all 0.5s;
        }
    </style>
</head>
<body>
    <h1>编程侯老师的个人主页</h1>
    <h2>100万粉丝啦！！！</h2>
    <img src="./icon.png" onclick="hackerAttack()" />
    <a href="http://codinghou.cn"><h1>🔥点击传送：进入侯网🔥</h1></a>
    <script>
        function hackerAttack() {
            var n = 100;
            for(var i=1; i<=n; i++) {
                // alert('你上当了！关不掉吧？这是第'+ i + '次警告！');

                setTimeout(() => {
                    let box = document.createElement('div');
                    box.innerText = '⚠️系统错误！⚠️';
                    box.className = 'fake-alert';
                    document.body.appendChild(box);
                    box.offsetHeight;

                    box.style.left = (Math.random() * 100) + '%'
                    box.style.top = (Math.random() * 100) + '%'
                    box.style.opacity = '1'
                    box.style.transform = `scale(${Math.random() + 0.5}) rotate(${Math.random() * 60 - 30}deg)`
                }, i*20);
            }
        }
    </script>
</body>
</html>
